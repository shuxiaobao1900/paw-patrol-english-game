<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐾 汪汪队英语乐园 - 完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
        }
        
        /* 汪汪队主题头部 */
        .header {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
            color: white;
            padding: 20px 15px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: "🐾 🐶 🐱 🐰 🐘 🐟 🚗 🍎 👦";
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            font-size: 24px;
            opacity: 0.3;
            animation: float 30s linear infinite;
        }
        
        @keyframes float {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .header h1 {
            font-size: 26px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }
        
        /* 主题选择器 */
        .theme-selector {
            padding: 12px 10px;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            overflow-x: auto;
            gap: 8px;
            scrollbar-width: none;
        }
        
        .theme-selector::-webkit-scrollbar {
            display: none;
        }
        
        .theme-btn {
            flex-shrink: 0;
            padding: 8px 12px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 70px;
            justify-content: center;
        }
        
        .theme-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .theme-btn:active {
            transform: scale(0.95);
        }
        
        /* 主内容区 */
        .content {
            padding: 20px 15px;
            min-height: 450px;
        }
        
        /* 游戏模式选择 */
        .game-modes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 5px 0;
        }
        
        .mode-card {
            background: white;
            border-radius: 16px;
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .mode-card:active {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        
        .mode-card.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f2f5 100%);
        }
        
        .mode-icon {
            font-size: 36px;
            margin-bottom: 3px;
        }
        
        .mode-name {
            font-size: 15px;
            font-weight: bold;
            color: #333;
        }
        
        .mode-desc {
            font-size: 11px;
            color: #666;
            line-height: 1.3;
        }
        
        /* 闪卡样式 */
        .flashcard {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            color: white;
            margin-bottom: 20px;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .flashcard-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        .flashcard-word {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .flashcard-translation {
            font-size: 20px;
            opacity: 0.9;
        }
        
        .flashcard-hint {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 10px;
        }
        
        /* 配对游戏 */
        .matching-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .matching-card {
            background: white;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }
        
        .matching-card.selected {
            border-color: #667eea;
            background: #f0f2f5;
        }
        
        .matching-card.matched {
            border-color: #43e97b;
            background: #f0fff4;
        }
        
        .matching-emoji {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        /* 拼写游戏 */
        .spelling-area {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .spelling-hint {
            font-size: 16px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .spelling-emoji {
            font-size: 50px;
            margin: 15px 0;
        }
        
        .letter-bank {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .letter-tile {
            width: 45px;
            height: 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .letter-tile.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .letter-tile.used {
            background: #ccc;
            color: #999;
            border-color: #ccc;
            cursor: not-allowed;
        }
        
        .current-spelling {
            font-size: 18px;
            color: #666;
            margin-bottom: 15px;
            min-height: 25px;
            padding: 10px;
            background: white;
            border-radius: 8px;
        }
        
        /* 听力游戏 */
        .listening-area {
            text-align: center;
            padding: 25px 15px;
            background: #f8f9fa;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        
        .play-btn {
            display: inline-block;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 32px;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .play-btn:active {
            transform: scale(0.95);
        }
        
        .listening-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        
        .listening-option {
            padding: 15px;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            text-align: center;
        }
        
        .listening-option:active {
            transform: scale(0.95);
        }
        
        /* 结果统计 */
        .result-stats {
            text-align: center;
            padding: 30px 20px;
        }
        
        .result-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        
        .result-score {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        
        .result-message {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        /* 徽章展示 */
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .badge-item {
            text-align: center;
        }
        
        .badge-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            margin: 0 auto 5px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            opacity: 0.2;
            transition: all 0.3s ease;
        }
        
        .badge-circle.earned {
            opacity: 1;
            animation: badgePop 0.5s ease;
        }
        
        .badge-name {
            font-size: 10px;
            color: #666;
            line-height: 1.2;
        }
        
        @keyframes badgePop {
            0% { transform: scale(0); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        /* 按钮组 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-row {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 15px 18px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }
        
        /* 底部统计栏 */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border-top: 2px solid #e0e0e0;
            font-size: 14px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 11px;
        }
        
        /* 游戏信息 */
        .game-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .info-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .info-content {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }
        
        /* 欢迎信息 */
        .welcome-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f2f5 100%);
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .welcome-emoji {
            font-size: 60px;
            margin-bottom: 15px;
        }
        
        .welcome-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .welcome-text {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        
        .word-count {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }
        
        /* 动画 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* 响应式优化 */
        @media (max-width: 380px) {
            .header h1 { font-size: 20px; }
            .mode-card { padding: 12px 8px; }
            .mode-icon { font-size: 30px; }
            .mode-name { font-size: 14px; }
            .mode-desc { font-size: 10px; }
            .flashcard-word { font-size: 28px; }
            .letter-tile { width: 40px; height: 40px; font-size: 20px; }
            .badges-grid { grid-template-columns: repeat(3, 1fr); }
            .badges-grid .badge-item:last-child { display: none; }
        }
        
        @media (max-width: 320px) {
            .game-modes { grid-template-columns: 1fr; }
            .matching-grid { grid-template-columns: 1fr; }
            .listening-options { grid-template-columns: 1fr; }
            .badges-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

        // 配对游戏
        function showMatchingGame() {
            const words = contentLibrary.words[gameData.currentTheme];
            const selectedWords = [...words].sort(() => Math.random() - 0.5).slice(0, 4);
            const pairs = [];
            selectedWords.forEach(word => {
                pairs.push({ type: 'english', value: word.en, match: word.zh, emoji: word.emoji });
                pairs.push({ type: 'chinese', value: word.zh, match: word.en, emoji: word.emoji });
            });
            const shuffledPairs = [...pairs].sort(() => Math.random() - 0.5);
            
            const content = document.getElementById('gameContent');
            content.innerHTML = `
                <div class="game-info">
                    <div class="info-title">🧩 配对游戏</div>
                    <div class="info-content">
                        点击卡片，将英文和中文配对
                    </div>
                </div>
                <div class="matching-grid" id="matchingGrid">
                    ${shuffledPairs.map((pair, index) => `
                        <div class="matching-card" onclick="selectMatchingCard(${index})" data-index="${index}">
                            <div class="matching-emoji">${pair.emoji}</div>
                            <div>${pair.value}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="btn-group">
                    <button class="btn" onclick="showMainMenu()">
                        🏠 返回菜单
                    </button>
                </div>
            `;
            
            window.matchingPairs = shuffledPairs;
            window.selectedMatchingCards = [];
            window.matchedCount = 0;
        }
        
        // 选择配对卡片
        function selectMatchingCard(index) {
            const card = document.querySelector(`[data-index="${index}"]`);
            if (card.classList.contains('matched') || card.classList.contains('selected')) return;
            
            card.classList.add('selected');
            window.selectedMatchingCards.push(index);
            
            if (window.selectedMatchingCards.length === 2) {
                const [idx1, idx2] = window.selectedMatchingCards;
                const pair1 = window.matchingPairs[idx1];
                const pair2 = window.matchingPairs[idx2];
                
                if ((pair1.type === 'english' && pair2.type === 'chinese' && pair1.match === pair2.value) ||
                    (pair2.type === 'english' && pair1.type === 'chinese' && pair2.match === pair1.value)) {
                    // 匹配成功
                    document.querySelector(`[data-index="${idx1}"]`).classList.remove('selected');
                    document.querySelector(`[data-index="${idx2}"]`).classList.remove('selected');
                    document.querySelector(`[data-index="${idx1}"]`).classList.add('matched');
                    document.querySelector(`[data-index="${idx2}"]`).classList.add('matched');
                    gameData.score += 10;
                    gameData.streak++;
                    window.matchedCount++;
                    awardBadgeForStreak();
                    awardBadgeForScore();
                    updateStats();
                    awardBadge('matching_champ');
                    
                    // 检查是否全部匹配
                    if (window.matchedCount === 4) {
                        setTimeout(() => {
                            alert('🎉 太棒了！所有配对都完成了！');
                            gameData.level++;
                            showMatchingGame();
                        }, 500);
                    }
                } else {
                    // 匹配失败
                    setTimeout(() => {
                        document.querySelector(`[data-index="${idx1}"]`).classList.remove('selected');
                        document.querySelector(`[data-index="${idx2}"]`).classList.remove('selected');
                        gameData.streak = 0;
                        updateStats();
                    }, 1000);
                }
                
                window.selectedMatchingCards = [];
            }
        }

                display.textContent = window.selectedLetters.join(' ');

            const earnedThemes = [];
            if (gameData.earnedBadges.includes('animals_expert')) earnedThemes.push('animals_expert');
            if (gameData.earnedBadges.includes('fruits_expert')) earnedThemes.push('fruits_expert');
            if (gameData.earnedBadges.includes('colors_expert')) earnedThemes.push('colors_expert');
            
            if (earnedThemes.length >= 3) {
                awardBadge('all_themes');
            }
        }
        
        // 检查词汇达人徽章
        function checkVocabBadge() {
            if (gameData.score >= 200) {
                awardBadge('vocab_master');
            }
        }
        
        // 更新统计信息
        function updateStats() {
            document.getElementById('scoreDisplay').textContent = gameData.score;
            document.getElementById('streakDisplay').textContent = gameData.streak;
            document.getElementById('badgeCount').textContent = gameData.earnedBadges.length;
        }
        
        // 页面加载完成后初始化
        window.onload = initGame;
    </script>
</body>
</html>
